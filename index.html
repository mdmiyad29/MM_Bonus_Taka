<!DOCTYPE html>
<html>
<head>
    <title>MM Bonus Taka</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f4c3a, #1a8c6b, #0f4c3a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 500px;
            width: 90%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px 20px;
            color: white;
        }

        h1 { text-align: center; font-size: 28px; margin-bottom: 10px; text-shadow: 0 3px 10px rgba(0,0,0,0.3); }
        .step { text-align: center; font-size: 18px; margin: 15px 0; opacity: 0.9; }

        input {
            width: 90%;
            padding: 14px 16px;
            margin: 12px auto;
            display: block;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.3);
        }

        button {
            width: 90%;
            padding: 15px;
            margin: 12px auto;
            display: block;
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #0f4c3a;
            font-weight: 700;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s;
        }

        button:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .hide { display: none; }

        #points { font-size: 24px; font-weight: 700; text-align: center; margin: 20px 0; }
        #message { text-align: center; min-height: 80px; font-weight: 500; padding: 10px; line-height: 1.5; }

        .pay-info {
            text-align: center;
            background: rgba(255,255,255,0.25);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            font-weight: 600;
            border: 2px solid #ffd700;
        }
    </style>
</head>
<body>

<!-- Registration Screen -->
<div class="container" id="registerScreen">
    <h1>MM Bonus Taka</h1>
    <p class="step">✨ Create Your Account</p>
    
    <input type="tel" id="regName" placeholder="আপনার পুরো নাম">
    <input type="tel" id="regPhone" placeholder="১১ সংখ্যার ফোন নাম্বার" maxlength="11">
    <input type="password" id="regPassword" placeholder="৮ সংখ্যার পাসওয়ার্ড" maxlength="8">
    
    <button onclick="register()">Register Now</button>
</div>

<!-- Login Screen -->
<div class="container hide" id="loginScreen">
    <h1>MM Bonus Taka</h1>
    <p class="step">Welcome Back</p>
    
    <input type="tel" id="loginPhone" placeholder="১১ সংখ্যার ফোন নাম্বার" maxlength="11">
    <input type="password" id="loginPassword" placeholder="৮ সংখ্যার পাসওয়ার্ড" maxlength="8">
    
    <button onclick="login()">Login</button>
    
    <p style="text-align:center; margin-top:20px;">
        <button onclick="showRegister()" style="background:rgba(255,255,255,0.2); color:white;">Create New Account</button>
    </p>
</div>

<!-- Main App -->
<div class="container hide" id="mainApp">
    <h1>Welcome, <span id="userDisplay"></span>! 👋</h1>
    
    <button onclick="spin()">🎰 Spin & Earn Points</button>
    <button onclick="scratch()">🎟 Scratch Card</button>
    
    <input type="number" id="depositAmount" placeholder="কত টাকা ডিপোজিট করবেন?">
    <button onclick="deposit()">💰 Deposit Now</button>
    
    <div class="pay-info">
        Pay to: <strong>01931692088</strong><br>
        (বিকাশ / নগদ / রকেট) - Friend Request
    </div>
    
    <button onclick="initWithdraw()">💵 Withdraw Points</button>
    
    <div id="points">Total Points: 0</div>
    <div id="message"></div>
    
    <div class="footer">
        Earn 15,000 points = 100৳ • Withdrawal processed within 24 hours
    </div>
</div>

<script>
    let points = 0;
    let currentUser = {};

    // Validation Functions
    function isValidPhone(phone) {
        return /^\d{11}$/.test(phone);
    }

    function isValidPassword(pass) {
        return /^\d{8}$/.test(pass);
    }

    function register() {
        let name = document.getElementById('regName').value.trim();
        let phone = document.getElementById('regPhone').value.trim();
        let password = document.getElementById('regPassword').value.trim();

        if (!name) return alert("নাম লিখুন");
        if (!isValidPhone(phone)) return alert("ফোন নাম্বার অবশ্যই ১১ সংখ্যার হতে হবে");
        if (!isValidPassword(password)) return alert("পাসওয়ার্ড অবশ্যই ৮ সংখ্যার হতে হবে");

        currentUser = { name, phone, password };
        localStorage.setItem('mmBonusUser', JSON.stringify(currentUser));

        alert('✅ রেজিস্ট্রেশন সফল হয়েছে!');
        showLogin();
    }

    function login() {
        let phone = document.getElementById('loginPhone').value.trim();
        let password = document.getElementById('loginPassword').value.trim();

        if (!isValidPhone(phone)) return alert("ফোন নাম্বার অবশ্যই ১১ সংখ্যার হতে হবে");
        if (!isValidPassword(password)) return alert("পাসওয়ার্ড অবশ্যই ৮ সংখ্যার হতে হবে");

        let saved = localStorage.getItem('mmBonusUser');
        if (!saved) return alert('প্রথমে রেজিস্ট্রেশন করুন');

        let user = JSON.parse(saved);

        if (user.phone === phone && user.password === password) {
            currentUser = user;
            document.getElementById('userDisplay').innerText = user.name;
            document.getElementById('loginScreen').classList.add('hide');
            document.getElementById('mainApp').classList.remove('hide');
            updateDisplay('🎉 লগইন সফল হয়েছে!');
        } else {
            alert('❌ ফোন নাম্বার অথবা পাসওয়ার্ড ভুল');
        }
    }

    function showLogin() {
        document.getElementById('registerScreen').classList.add('hide');
        document.getElementById('loginScreen').classList.remove('hide');
    }

    function showRegister() {
        document.getElementById('loginScreen').classList.add('hide');
        document.getElementById('registerScreen').classList.remove('hide');
    }

    function spin() {
        let earn = Math.floor(Math.random() * 51) + 10;
        points += earn;
        updateDisplay(`🎰 +${earn} points from Spin!`);
    }

    function scratch() {
        let earn = Math.floor(Math.random() * 121) + 15;
        points += earn;
        updateDisplay(`🎟 Scratch Card: +${earn} points!`);
    }

    function deposit() {
        let amount = parseInt(document.getElementById('depositAmount').value);
        if (!amount || amount <= 0) return alert('সঠিক পরিমাণ লিখুন');

        document.getElementById('message').innerHTML = `
            <strong style="color:#ffd700;">
                💰 ${amount} টাকা ডিপোজিট করতে<br>
                01931692088 নাম্বারে Send Money করুন<br>
                (Friend Request হিসেবে)
            </strong>`;
        document.getElementById('depositAmount').value = '';
    }

    function initWithdraw() {
        if (points < 15000) {
            return updateDisplay('❌ উইথড্র করতে কমপক্ষে ১৫,০০০ পয়েন্ট লাগবে');
        }

        let withdrawNumber = prompt("উইথড্র টাকা পাবেন কোন নাম্বারে?", currentUser.phone);
        if (!withdrawNumber) return;

        let requestedTaka = parseInt(prompt("কত টাকা উইথড্র করতে চান?", "100"));
        if (!requestedTaka || requestedTaka < 100) return alert("সর্বনিম্ন ১০০ টাকা উইথড্র করতে পারবেন");

        let requiredPoints = requestedTaka * 150;
        if (points < requiredPoints) return alert(`পর্যাপ্ত পয়েন্ট নেই। ${requiredPoints} পয়েন্ট লাগবে।`);

        let enteredPass = prompt("নিশ্চিতকরণের জন্য আপনার ৮ সংখ্যার পাসওয়ার্ড দিন:");
        if (enteredPass !== currentUser.password) return alert("❌ পাসওয়ার্ড ভুল!");

        points -= requiredPoints;
        updateDisplay(`✅ ${requestedTaka}৳ উইথড্র রিকোয়েস্ট সফল!<br>২৪ ঘণ্টার মধ্যে ${withdrawNumber} নাম্বারে টাকা পাবেন।`);
    }

    function updateDisplay(message) {
        document.getElementById('points').innerText = `Total Points: ${points}`;
        if (message) document.getElementById('message').innerHTML = message;
    }

    window.onload = () => {
        if (localStorage.getItem('mmBonusUser')) {
            document.getElementById('registerScreen').classList.add('hide');
            document.getElementById('loginScreen').classList.remove('hide');
        }
    };
</script>

</body>
</html>
