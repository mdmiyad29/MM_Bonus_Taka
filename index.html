<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sex Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family: Arial, sans-serif; background:#1a1a1a; color:#fff; }
        header { 
            background:#000; padding:12px 15px; display:flex; align-items:center; 
            justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,0.5); position:sticky; top:0;
        }
        .logo { 
            font-size:32px; font-weight:bold; color:#ff2d55; 
        }
        .main { display:flex; max-width:1300px; margin:15px auto; gap:15px; }
        .feed { flex:1; max-width:600px; }
        .sidebar { width:320px; background:#222; padding:15px; border-radius:12px; height:85vh; overflow-y:auto; }
        .post, .create-post { 
            background:#222; margin-bottom:15px; border-radius:12px; 
            padding:15px; box-shadow:0 1px 6px rgba(0,0,0,0.5);
        }
        .profile-pic { 
            width:48px; height:48px; border-radius:50%; object-fit:cover; 
            border:3px solid #ff2d55; cursor:pointer;
        }
        img, video { width:100%; border-radius:10px; margin:10px 0; }
        .friend-item { display:flex; align-items:center; gap:12px; padding:12px 8px; border-bottom:1px solid #333; }
        .add-btn { background:#ff2d55; color:white; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">🔥 Sex Chat</div>
    <input type="text" placeholder="🔍 Search Hot Girls..." style="width:40%; padding:12px; border-radius:30px; background:#333; border:none; color:white;">
    <i class="fas fa-comment-dots" style="font-size:26px; cursor:pointer; color:#ff2d55;" onclick="toggleChat()"></i>
</header>

<div class="main">
    <div class="feed">
        <div class="create-post">
            <h4>🔥 কী শেয়ার করবেন আজ?</h4>
            <textarea id="postText" rows="3" placeholder="আজকের হট মুহূর্ত শেয়ার করুন... 🔥"></textarea>
            <input type="file" id="uploadFile" accept="image/*,video/*">
            <button onclick="createPost()" style="background:#ff2d55;color:white;padding:12px 30px;border:none;border-radius:8px;margin-top:10px;">পোস্ট করুন</button>
        </div>
        <div id="feed"></div>
    </div>

    <div class="sidebar">
        <h3>👥 Suggested Hot Friends</h3>
        <div id="suggestedFriends"></div>
    </div>
</div>

<!-- Chat Box -->
<div id="chatBox" style="position:fixed; bottom:20px; right:20px; width:340px; background:#222; border-radius:12px; box-shadow:0 5px 25px rgba(255,45,85,0.4); display:none; z-index:1000;">
    <div style="background:#ff2d55; color:white; padding:12px; border-radius:12px 12px 0 0;">
        🔥 <span id="chatName">Riya Khan</span>
    </div>
    <div id="chatMessages" style="height:340px; overflow-y:auto; padding:12px; background:#1a1a1a;"></div>
    <input type="text" id="chatInput" placeholder="Sexy মেসেজ লিখুন..." 
           style="width:100%; padding:14px; background:#333; border:none; color:white;" 
           onkeypress="if(event.key==='Enter') sendMessage()">
</div>

<script>
const hotPics = ["wife.jpg", "girl1.jpg", "girl2.jpg"];
const baseNames = ["Riya Khan", "Priya Sharma", "Sonia Roy", "Nadia Islam", "Tania Ahmed", "Mona Khan", "Sara Malik", "Anika Basu", "Rimi Akter", "Puja Roy"];

let posts = [];

// ... (আগের কোডের মতো createPost, renderFeed, renderSuggestedFriends, chat ফাংশন রাখা হয়েছে)

function createPost() {
    const text = document.getElementById('postText').value.trim();
    const file = document.getElementById('uploadFile').files[0];

    const post = {
        name: baseNames[Math.floor(Math.random()*baseNames.length)],
        profilePic: hotPics[Math.floor(Math.random()*hotPics.length)],
        text: text || "🔥 আজ অনেক হট লাগছে...",
        likes: Math.floor(Math.random()*4500) + 500,
        fileURL: file ? URL.createObjectURL(file) : null,
        fileType: file ? (file.type.startsWith('video') ? 'video' : 'image') : null
    };

    posts.unshift(post);
    renderFeed();
    document.getElementById('postText').value = '';
    document.getElementById('uploadFile').value = '';
}

function renderFeed() {
    document.getElementById('feed').innerHTML = posts.map(post => `
        <div class="post">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="\( {post.profilePic}" class="profile-pic" onclick="startChat(' \){post.name}')">
                <div><strong>${post.name}</strong><br><small>এখনই 🔥</small></div>
            </div>
            <p>${post.text}</p>
            \( {post.fileURL ? (post.fileType === 'video' ? `<video controls><source src=" \){post.fileURL}"></video>` : `<img src="${post.fileURL}">`) : ''}
            <div style="margin-top:12px; color:#ff2d55; font-weight:bold;">❤️ ${post.likes} জন লাইক করেছে</div>
        </div>
    `).join('');
}

// Suggested Friends + Chat ফাংশন (আগের কোড থেকে নেওয়া)
function renderSuggestedFriends() {
    let html = '';
    for(let i = 0; i < 30; i++) {
        const name = baseNames[i % baseNames.length] + (i > 10 ? " " + (i+1) : "");
        html += `
            <div class="friend-item">
                <img src="\( {hotPics[Math.floor(Math.random()*3)]}" class="profile-pic" onclick="startChat(' \){name}')">
                <div style="flex:1;"><strong>${name}</strong></div>
                <button class="add-btn" onclick="this.textContent='Request Sent';this.style.background='#666'">Add Friend</button>
            </div>
        `;
    }
    document.getElementById('suggestedFriends').innerHTML = html;
}

function startChat(name) {
    document.getElementById('chatName').textContent = name;
    document.getElementById('chatBox').style.display = 'block';
    document.getElementById('chatMessages').innerHTML = `<p><strong>${name}:</strong> হাই বেবি, কী করছো? 🔥😈</p>`;
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    if(!input.value.trim()) return;
    const chatDiv = document.getElementById('chatMessages');
    chatDiv.innerHTML += `<p style="text-align:right; color:#ff2d55;">আমি: ${input.value}</p>`;
    const msg = input.value;
    input.value = '';
    chatDiv.scrollTop = chatDiv.scrollHeight;

    setTimeout(() => {
        const replies = ["😈 আরও দেখাও", "🔥 খুব হট লাগছে", "প্রাইভেটে আসো...", "তোমার সাথে সেক্স চ্যাট করতে চাই 🔥"];
        chatDiv.innerHTML += `<p><strong>${document.getElementById('chatName').textContent}:</strong> ${replies[Math.floor(Math.random()*replies.length)]}</p>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }, 800);
}

window.onload = () => {
    renderSuggestedFriends();
    for(let i = 0; i < 5; i++) createPost();
};
</script>
</body>
</html>
